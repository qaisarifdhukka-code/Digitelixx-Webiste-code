  <style>
    :root {
      --orange: #F05A22;
      --teal-dark: #1A3C5E;
      --white: #FFFFFF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--white);
      color: var(--teal-dark);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      
      /* Subtle Grid Background */
      background-image: linear-gradient(rgba(26, 60, 94, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(26, 60, 94, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .header {
      position: absolute;
      top: 40px;
      left: 5%;
    }
    
    .header img {
      height: 40px;
    }
    
    .content {
      text-align: center;
      max-width: 600px;
      padding: 0 20px;
      z-index: 10;
    }
    
    .badge {
      display: inline-block;
      background-color: rgba(240, 90, 34, 0.1);
      color: var(--orange);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 24px;
      font-family: 'Space Grotesk', sans-serif;
    }
    
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1.1;
      margin-bottom: 24px;
      color: var(--teal-dark);
      letter-spacing: -0.04em;
    }
    
    p {
      font-size: 1.2rem;
      color: #64748B;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: var(--teal-dark);
      color: white;
      padding: 14px 28px;
      border-radius: 100px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    
    .btn:hover {
      background-color: #0f2740;
      transform: translateY(-2px);
    }
  </style>
</head>

    function copyEmail() {
      navigator.clipboard.writeText("info@digitelixx.com").then(() => {
